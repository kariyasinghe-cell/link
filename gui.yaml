name: UI Automation Tests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestNG suite XML to run'
        required: true
        default: 'api-testng.xml'
        type: choice
        options:
          - api-testng.xml
          - gui-full.xml
          - gui-R1_1.xml
          - gui-R1_2.xml
          - gui-R2.xml
          - gui-R3.xml
          - my set.xml

jobs:
  ui-tests:
    name: Run Selenium Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      APP_URL:        ${{ secrets.APP_URL }}
      APP_USERNAME:   ${{ secrets.APP_USERNAME }}
      APP_PASSWORD:   ${{ secrets.APP_PASSWORD }}
      DB_HOST:        ${{ secrets.DB_HOST }}
      DB_PORT:        ${{ secrets.DB_PORT }}
      DB_NAME:        ${{ secrets.DB_NAME }}
      DB_USER:        ${{ secrets.DB_USER }}
      DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify Chrome installation
        run: |
          google-chrome --version
          which google-chrome

      - name: Install xvfb (virtual display)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Show environment
        run: |
          echo "Java:"; java -version
          echo "Maven:"; mvn -version
          echo "Chrome:"; google-chrome --version
          echo "Working dir contents:"; ls -la

      - name: Run tests
        run: |
          SUITE="${{ github.event.inputs.suite || 'api-testng.xml' }}"
          echo "Running suite: $SUITE"
          mvn -B -ntp test \
            -DsuiteXmlFile="$SUITE" \
            -Dheadless=true \
            -Dapp.url="$APP_URL" \
            -Dapp.username="$APP_USERNAME" \
            -Dapp.password="$APP_PASSWORD" \
            -Ddb.host="$DB_HOST" \
            -Ddb.port="$DB_PORT" \
            -Ddb.name="$DB_NAME" \
            -Ddb.user="$DB_USER" \
            -Ddb.password="$DB_PASSWORD"

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload TestNG output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-output
          path: test-output/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Extent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-reports
          path: |
            reports/
            **/extent-report*.html
            **/ExtentReport*.html
          retention-days: 14
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            screenshots/
            **/*.png
          retention-days: 14
          if-no-files-found: warn

      - name: Test summary
        if: always()
        run: |
          echo "## Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Suite: \`${{ github.event.inputs.suite || 'api-testng.xml' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Reports uploaded as artifacts (Surefire, TestNG, Extent, screenshots)" >> $GITHUB_STEP_SUMMARY
