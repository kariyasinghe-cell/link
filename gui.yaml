name: Sampath SVR4 GUI Automation CI

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'XML suite to run'
        required: true
        default: 'gui-full.xml'
        type: choice
        options:
          - gui-full.xml
          - gui-R1_1.xml
          - gui-R1_2.xml
          - gui-R2.xml
          - gui-R3.xml
  schedule:
    - cron: '0 18 * * *'
  push:
    branches:
      - 'guiTestCIWorkflow'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Maven 3.6.3
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://archive.apache.org/dist/maven/maven-3/3.6.3/binaries/apache-maven-3.6.3-bin.zip -OutFile maven.zip
          Expand-Archive -Path maven.zip -DestinationPath $env:USERPROFILE\maven
          echo "$env:USERPROFILE\maven\apache-maven-3.6.3\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Check build environment
        shell: pwsh
        run: |
          Write-Host "Java version:"
          java -version
          Write-Host "Maven version:"
          mvn -version

      - name: Verify Chrome installation
        shell: pwsh
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          if (-Not (Test-Path $chrome)) {
            $chrome = "C:\Program Files (x86)\Google\Chrome\Application\chrome.exe"
          }
          Write-Host "Chrome path: $chrome"
          (Get-Item $chrome).VersionInfo.ProductVersion

      - name: Verify path
        shell: pwsh
        run: |
          Get-Location
          Get-ChildItem -Recurse -Depth 2
          Get-ChildItem src\test\resources\TEST_DATA\

      - name: Run tests
        shell: pwsh
        run: |
          $suite = if ("${{ github.event.inputs.suite }}") { "${{ github.event.inputs.suite }}" } else { "gui-full.xml" }
          Write-Host "Running suite: $suite"
          mvn clean test "-DsuiteXmlFile=$suite" "-Dheadless=true"






