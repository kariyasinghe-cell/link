build-and-test:
    name: Build and Test
    needs: detect
    runs-on: [self-hosted, linux]
    container:
      image: ${{ needs.detect.outputs.python-image }}
      options: >-
        --volume ${{ inputs.workspace-path }}:/workspace
        --workdir /workspace
        --user 1000:1000
      env:
        HTTP_PROXY:    http://192.168.5.60:8080
        HTTPS_PROXY:   http://192.168.5.60:8080
        NO_PROXY:      localhost,127.0.0.1,.sampath.int
        PIP_PROXY:     http://192.168.5.60:8080
        PIP_INDEX_URL: https://pypi.org/simple
        HOME:          /tmp
    outputs:
      python-version: ${{ needs.detect.outputs.python-version }}




- name: Artifact Build (Docker)
        working-directory: ${{ env.WORKSPACE }}
        env:
          HTTP_PROXY:  http://192.168.5.60:8080
          HTTPS_PROXY: http://192.168.5.60:8080
          NO_PROXY:    localhost,127.0.0.1,.sampath.int,harborrepo.sampath.int
        run: |
          success=0
          for i in {1..4}; do
            echo "Attempt $i: building image..."
            if docker build --no-cache \
                 --build-arg HTTP_PROXY="$HTTP_PROXY" \
                 --build-arg HTTPS_PROXY="$HTTPS_PROXY" \
                 --build-arg NO_PROXY="$NO_PROXY" \
                 -t "${{ env.IMAGE_NAME }}" .; then
              success=1
              break
            else
              echo "Build failed on attempt $i, retrying in 5s..."
              sleep 5
            fi
          done
     
          if [ $success -ne 1 ]; then
            echo "ERROR: Docker build failed after 4 attempts"
            exit 1
          fi
     
          if ! docker image inspect "${{ env.IMAGE_NAME }}" > /dev/null 2>&1; then
            echo "ERROR: Image ${{ env.IMAGE_NAME }} not found. Build failed"
            exit 1
          fi
     
          echo "Docker image ${{ env.IMAGE_NAME }} built successfully."
