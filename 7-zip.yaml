- name: Extract Python Version from Dockerfile
        id: extract-python
        working-directory: ${{ env.WORKSPACE }}
        run: |
          cat /etc/os-release

          if [ ! -f "Dockerfile" ]; then
            echo "Error: Dockerfile not found in $(pwd)"
            exit 1
          fi

          PY_VERSION=$(grep -oP 'python:\K[0-9]+(\.[0-9]+)+' Dockerfile | head -n1 | tr -d '[:space:]\r')

          if [ -z "$PY_VERSION" ]; then
            echo "Error: Could not extract Python version from Dockerfile"
            exit 1
          fi

          echo "Detected python.version=$PY_VERSION"
          echo "python=$PY_VERSION" >> "$GITHUB_OUTPUT"
