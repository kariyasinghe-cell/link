Tomcat WAR Deployment Pipeline with Property Externalization
Before writing the pipeline, let me address step 4 since it drives the whole design.
Recommendation: Repack, don't rebuild
You have three realistic options for injecting env-specific properties into a prebuilt WAR:
Option A — Rebuild from source with Maven profiles: Clean, but defeats the purpose of having a release artifact. You lose the guarantee that Dev/UAT/Prod run the exact same bytecode, and you pay the full build time on every deploy.
Option B — Externalize via Tomcat (CATALINA_OPTS, conf/Catalina/localhost/*.xml, or JNDI): The "correct" Java EE way. Properties live outside the WAR entirely and the app reads them via System.getProperty() or @Value("${...}") with a file: PropertySource. Best long-term, but requires app code cooperation and Tomcat-side config management.
Option C — Repack the WAR (swap WEB-INF/classes/*.properties): Take the released WAR, replace the properties files inside the zip, write out app-<env>.war. Fast (seconds), no rebuild, same artifact provenance, works with any Spring/Servlet app that reads classpath properties. This is what most banks actually do for this pattern.
I'll go with Option C as the default and leave a note on how to migrate to B later. If your app already reads properties from an external path (e.g., -Dconfig.location=/opt/tomcat/conf/app.properties), tell me and I'll switch the pipeline to just copy the file alongside the WAR instead of repacking.
Assumed repo layouts
Config repo (sampathbankplc/devops-central-repository or similar):
config-repo/
├── app-payments/
│   ├── dev/application.properties
│   ├── uat/application.properties
│   └── prod/application.properties
└── app-onboarding/
    ├── dev/...
    └── ...
Inside the WAR, properties sit at WEB-INF/classes/application.properties (adjust the WAR_PROPS_PATH env var if yours differs — e.g., WEB-INF/classes/config/app.properties).
The pipelineCreated a file, read a fileCreated a file, read a fileNotes on the design choices
Why sparse checkout of the config repo. You don't want Dev runners cloning Prod secrets-shaped property files. Sparse checkout pulls only <app>/<env>/ — smaller blast radius and faster clones as the config repo grows.
Why zip -f then fallback to zip. -f updates an existing entry; if the path doesn't exist yet in the archive (rare, but possible for apps that expect the file to be dropped in externally), the plain zip adds it. Either way, the final unzip -p | head proves what's actually inside — I learned the hard way that trusting the exit code of zip operations without verifying is how wrong configs reach Prod.
Why path= and update=true on the Manager API. update=true makes the deploy idempotent — Tomcat undeploys the old context before installing the new one, so you don't get "context already exists" errors on the second run. The path param sets the context path explicitly so it doesn't depend on the WAR filename.
Why grep "^OK -" after a 200. Tomcat Manager is famous for returning HTTP 200 with a body like FAIL - Application at context path ... could not be started. Checking only the status code will let broken deploys through.
Secrets / vars you need to set:

CONFIG_REPO_PAT — fine-grained PAT, read-only on the config repo
TOMCAT_URL, TOMCAT_USER, TOMCAT_PASS — per-environment (scope them to the GitHub Environment, not repo-wide)
TEAMS_WEBHOOK_URL — your existing Power Automate webhook
HEALTH_PATH (repo/env variable, optional) — defaults to /actuator/health

The Prod gate. Because the job declares environment: ${{ inputs.environment }}, configuring Required reviewers on the prod Environment in repo settings is what actually makes Prod deploys require approval. Don't rely on branch protection alone for this.
When to move to Option B (external properties)
If you ever want to stop repacking, have the app read from file:${config.location}/application.properties via Spring's PropertySource, then this pipeline shrinks to: fetch properties → scp to /opt/tomcat/conf/<app>/ → deploy the unmodified release WAR. The WAR becomes truly env-agnostic and you can promote the exact same binary Dev→UAT→Prod with zero mutation. Happy to write that variant if you want to plan the migration.
One thing to confirm before you run this: what's the exact path of the properties file inside your WAR? If it's not WEB-INF/classes/application.properties, update WAR_PROPS_PATH at the top of the workflow.Deploy war to tomcatYML Downloadthe current mannual usage is they use 7zip tool to update the propertiesApr 17Got it — that's exactly the Option C pattern, just done by hand with 7-Zip's GUI. The pipeline automates the same operation.
What 7-Zip is actually doing
When someone drags a .properties file onto a WAR opened in 7-Zip, it's running the equivalent of:
7z u app.war WEB-INF/classes/application.properties
7z u (update) replaces the entry if it exists, adds it if it doesn't. That's it. WARs are just ZIP files, so 7-Zip, zip, jar, and Python's zipfile all produce byte-compatible output — any app that accepts the manually-edited WAR will accept the pipeline's output.
Matching the manual workflow exactly
If you want the pipeline to mirror what the team already does (and what ops will recognize when debugging), swap the "Inject properties" step to use 7z instead of zip. It's pre-installed on ubuntu-latest runners as 7z/7za, and on self-hosted Linux runners you install it with apt-get install -y p7zip-full.
Replace the "Inject properties into WAR" step with this:
yaml      - name: Inject properties into WAR (7-Zip, matches manual process)
        run: |
          set -euo pipefail
          WAR="artifact/${{ inputs.war_asset_name }}"
          OUT="artifact/${{ inputs.application }}-${{ inputs.environment }}.war"
          cp "$WAR" "$OUT"

          # Stage the replacement at the exact internal path 7z expects.
          # 7z preserves the directory structure relative to where you run it from.
          STAGE=$(mktemp -d)
          mkdir -p "$STAGE/$(dirname "${WAR_PROPS_PATH}")"
          cp "$PROPS_FILE" "$STAGE/${WAR_PROPS_PATH}"

          # `u` = update (replace if exists, add if not) — same as drag-and-drop in 7-Zip GUI
          # `-tzip` = treat .war as zip (7z would otherwise guess, usually fine, but be explicit)
          # `-bb1` = verbose so the log shows which file was replaced
          ( cd "$STAGE" && 7z u -tzip -bb1 "$GITHUB_WORKSPACE/$OUT" "${WAR_PROPS_PATH}" )

          echo "--- Verifying injected properties ---"
          7z x -so "$OUT" "${WAR_PROPS_PATH}" | head -20
          echo "--- WAR size: $(du -h "$OUT" | cut -f1) ---"
          echo "DEPLOY_WAR=$OUT" >> "$GITHUB_ENV"
If your self-hosted runner doesn't have 7-Zip yet, add this step before it (one-time, or bake into the runner image):
yaml      - name: Ensure 7-Zip is installed
        run: |
          if ! command -v 7z >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y p7zip-full
          fi
          7z --help | head -3
A practical advantage of doing it this way
When someone from ops says "I updated the WAR in 7-Zip and it worked, but your pipeline's output doesn't" — now you can rule out the packaging tool entirely, because it's literally the same binary producing the archive. The only remaining variable is the .properties file content, which is what you want the debugging conversation to be about anyway.
Everything else in the pipeline — the sparse checkout, the OK - check on Tomcat's response, the health probe, the concurrency group — stays as-is. Want me to regenerate the full file with the 7z step swapped in?      - name: Inject properties into WAR
