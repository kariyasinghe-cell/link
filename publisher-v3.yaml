          STAGE=$(mktemp -d)
          mkdir -p "$STAGE/$(dirname "${WAR_PROPS_PATH}")"
          cp "$PROPS_FILE" "$STAGE/${WAR_PROPS_PATH}"
 
          # Replace the entry inside the WAR. zip updates in place.
          ( cd "$STAGE" && zip -f "$GITHUB_WORKSPACE/$OUT" "${WAR_PROPS_PATH}" \
              || zip "$GITHUB_WORKSPACE/$OUT" "${WAR_PROPS_PATH}" )
 
          # Sanity check: confirm the file we just wrote is what's inside
          echo "--- Verifying injected properties ---"
          unzip -p "$OUT" "${WAR_PROPS_PATH}" | head -20
