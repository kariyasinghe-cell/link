          echo "DEPLOY_WAR=$OUT" >> "$GITHUB_ENV"explain each lineShow moreApr 17Line-by-line breakdown
yaml- name: Inject properties into WAR
  run: |
Standard GitHub Actions step. run: | starts a multi-line shell script. On Linux runners this defaults to bash -e {0} — so bash, with -e (exit on error) already enabled by GitHub.

bashset -euo pipefail
Strict mode. Four separate guarantees, and each one has saved a deploy somewhere:

-e — exit immediately if any command returns non-zero. GitHub sets this by default, but being explicit means the script behaves the same if you run it locally.
-u — treat unset variables as an error. If $PROPS_FILE was never exported (e.g., an earlier step silently failed), the script dies here instead of deploying a WAR with cp: cannot stat ''.
-o pipefail — in a pipeline like a | b | c, the exit code is the last non-zero command, not just the final one. Without this, cat missing.txt | head exits 0 because head succeeded.
The combination is the bash equivalent of "fail loud, fail early." Critical for deploy scripts where a silent failure means a subtly broken Prod.


bashWAR="artifact/${{ inputs.war_asset_name }}"
OUT="artifact/${{ inputs.application }}-${{ inputs.environment }}.war"
WAR = the file we downloaded from the GitHub Release (untouched original).
OUT = the path we'll write the env-specific WAR to.
The ${{ inputs.* }} bits are GitHub Actions expressions — they get substituted before the shell ever sees the script. So by the time bash runs, these lines literally read something like:
bashWAR="artifact/app-payments.war"
OUT="artifact/app-payments-uat.war"
Naming convention matters: app-payments-uat.war tells you at a glance which environment this artifact is pinned to. If someone grabs the wrong file from the artifacts tab, the filename itself prevents them from deploying UAT config to Prod.

bashcp "$WAR" "$OUT"
Duplicate the original WAR to the output path. We modify the copy, never the original. Two reasons:

If the modification step fails halfway, the original is still intact for retry.
The upload-artifact step at the end preserves the env-specific WAR for audit. If someone later asks "what exactly did we deploy to UAT on April 3?", you can download app-payments-uat.war from that workflow run and inspect it.

Quoting with "$WAR" (not $WAR) handles paths with spaces. Application names shouldn't have spaces, but quoting variables is a reflex worth keeping.

bashSTAGE=$(mktemp -d)
Create a temporary directory with a random name (e.g., /tmp/tmp.XyZ9qA). $(...) is command substitution — the directory path becomes the value of STAGE.
Why a temp dir at all? The zip command preserves the relative path of files as you pass them in. If I just did zip out.war /home/runner/work/.../application.properties, the entry inside the WAR would end up at that full path, not at WEB-INF/classes/application.properties. The staging directory lets us reconstruct the exact internal path before zipping.

bashmkdir -p "$STAGE/$(dirname "${WAR_PROPS_PATH}")"
Unpack this inside-out:

${WAR_PROPS_PATH} expands to WEB-INF/classes/application.properties (from the workflow's env: block).
dirname "..." strips the filename, leaving WEB-INF/classes.
$STAGE/WEB-INF/classes is the full path we need to create.
mkdir -p creates intermediate directories (WEB-INF then classes) and doesn't error if they exist.

So after this line, /tmp/tmp.XyZ9qA/WEB-INF/classes/ exists and is empty.

bashcp "$PROPS_FILE" "$STAGE/${WAR_PROPS_PATH}"
$PROPS_FILE was set earlier (in the "Validate properties file exists" step) to something like config-repo/app-payments/uat/application.properties.
We copy that file to /tmp/tmp.XyZ9qA/WEB-INF/classes/application.properties.
Now the staging directory mirrors the exact internal structure of the WAR for the one file we care about. Everything is lined up for zip to do the right thing.

bash( cd "$STAGE" && zip -f "$GITHUB_WORKSPACE/$OUT" "${WAR_PROPS_PATH}" \
    || zip "$GITHUB_WORKSPACE/$OUT" "${WAR_PROPS_PATH}" )
This is the step that actually modifies the WAR. Lots going on:
**The parentheses `( ... )`** — run the inside in a *subshell*. The `cd` only affects the subshell, so after this block finishes we're back in `GITHUBWORKSPACE‘.Withoutthesubshell,everysubsequentstepwouldstartfrom‘GITHUB_WORKSPACE`. Without the subshell, every subsequent step would start from `
GITHUBW​ORKSPACE‘.Withoutthesubshell,everysubsequentstepwouldstartfrom‘STAGE`, which would break things.

cd "$STAGE" — change into the staging directory. Now when zip sees the relative path WEB-INF/classes/application.properties, it finds the file we just staged there, and records it in the archive with that same relative path. This is the trick that places the file at the right spot inside the WAR.
**`GITHUBWORKSPACE/GITHUB_WORKSPACE/
GITHUBW​ORKSPACE/OUT`** — we need an *absolute* path to the WAR, because we just `cd`'d away from the workspace. `$GITHUB_WORKSPACE` is GitHub's env var for `/home/runner/work/<repo>/<repo>`.

zip -f — -f means "freshen": replace an entry if it exists in the archive AND is older than the file on disk. It will not add a new entry. It's the safer default — if the properties file somehow wasn't already in the WAR, -f would do nothing and we'd catch the problem in verification.
|| zip ... (without -f) — fallback. If -f did nothing (exit code signals no update happened) or failed, the plain zip command adds/updates the entry unconditionally. The || means "only run the second command if the first fails."
Honest caveat: the -f → plain-zip fallback is belt-and-braces. In practice, if your WAR was built by Maven, the properties file is always already inside, and -f works every time. The fallback exists for edge cases (custom build configs that externalize the file, first-time setup). If you want the behavior to mirror the manual 7-Zip process exactly — which is "update if exists, add if not" in one shot — swap this whole line for 7z u -tzip as in my previous message. Cleaner.

bashecho "--- Verifying injected properties ---"
unzip -p "$OUT" "${WAR_PROPS_PATH}" | head -20
unzip -p — extract to stdout (pipe), don't write to disk. It reads the named entry directly out of the WAR.
| head -20 — first 20 lines, so the CI log doesn't dump a 500-line properties file (and so secrets in it don't sprawl everywhere).
This step is the single most valuable line in the whole script. It proves — from the final artifact, not from an intermediate variable — that the properties file actually made it inside, at the correct path, with the correct content. If you're debugging a broken deploy and this output shows Dev values when you deployed to UAT, you know instantly that the sparse checkout or cp is wrong, not Tomcat.
A small tip: if your properties include passwords, consider replacing head -20 with something like head -20 | sed 's/password=.*/password=***/' to mask them in logs. Logs on self-hosted runners aren't as exposed as public-repo logs, but the habit is worth forming.

bashecho "--- WAR size: $(du -h "$OUT" | cut -f1) ---"
du -h reports disk usage in human-readable form (42M instead of 43521). Its output is 42M\t/path/to/file, so cut -f1 takes just the size field.
Why log the size? Because a corrupted zip operation sometimes produces a truncated or bloated file. If the original WAR was 42M and suddenly the output is 200K, you've caught a problem before Tomcat rejects it with a confusing error.

bashecho "DEPLOY_WAR=$OUT" >> "$GITHUB_ENV"
GitHub Actions magic. $GITHUB_ENV is a file path — whatever you append in KEY=VALUE format becomes an environment variable in all subsequent steps of the same job.
So after this, the "Deploy to Tomcat Manager" step can reference $DEPLOY_WAR without knowing how the path was constructed. This decouples the steps: if you later change the naming convention, only this step needs to update.
Worth noting: $GITHUB_ENV only works across steps. Within the same run: block you'd still use normal shell variables.

The overall shape
Strip away the details and the logic is:

Decide on an input path and an output path
Copy input → output (so we modify a copy, not the original)
Build a staging dir that mirrors the WAR's internal structure
Place the new properties file in staging
Zip-update the output WAR from inside the staging dir
Verify by reading back what we wrote
Hand the output path to the next step

The staging dir + cd dance is the only non-obvious part. Once you've seen it a few times it becomes second nature — it's the standard trick for controlling the internal path of files you're adding to an archive.how to test a war fileApr 17Testing a WAR file
There's no single answer — it depends on what you're trying to catch. I'll walk through the layers from cheapest/fastest to most realistic, because in a pipeline you want the fast checks to fail first.
1. Structural validation (milliseconds, no Tomcat needed)
Catches: corrupt archive, missing critical files, wrong properties injected.
bash# Is it a valid zip at all?
unzip -t app.war > /dev/null && echo "Archive OK" || echo "CORRUPTED"

# Does it have the bare minimum a WAR needs?
unzip -l app.war | grep -q "WEB-INF/web.xml" || echo "Missing web.xml"

# Did our property injection land in the right place with the right values?
unzip -p app.war WEB-INF/classes/application.properties | grep -E "^(db\.url|env\.name)="

# List all classes and libs — useful for diffing two builds
unzip -l app.war | grep -E "\.(class|jar)$" | wc -l
In the pipeline I gave you earlier, the unzip -p ... | head -20 line is exactly this layer. It's the cheapest check and catches 80% of "the deploy went wrong" cases — wrong env's properties, empty file, zip corruption.
2. Static analysis of WAR contents
Catches: dependency conflicts, known CVEs, accidentally-bundled secrets.
bash# List bundled JARs — watch for duplicates or unexpected versions
unzip -l app.war | grep "WEB-INF/lib/" | awk '{print $4}' | sort

# Scan for known vulnerabilities (OWASP Dependency-Check or Trivy)
trivy rootfs --scanners vuln app.war

# Scan for accidentally-committed secrets
unzip -p app.war WEB-INF/classes/application.properties | grep -iE "(password|secret|key|token)="
# ^ in a pipeline this should *expect* to find some (that's the point of the config repo),
#   but you can check values aren't empty or placeholders like "CHANGEME"
Trivy against a WAR is genuinely useful — it reads the bundled JARs and flags Log4Shell-class issues before the artifact touches a server.
3. Smoke test in a throwaway Tomcat container
Catches: startup failures, missing environment deps, context-path misconfig, classloader issues. Takes ~30 seconds.
bash# Start Tomcat with the WAR mounted as a deployable app
docker run -d --name smoke-test \
  -p 18080:8080 \
  -v "$(pwd)/app.war:/usr/local/tomcat/webapps/app.war:ro" \
  tomcat:9-jdk17   # match your prod Tomcat + JDK versions

# Wait for deployment (Tomcat exposes nothing until the context is ready)
for i in $(seq 1 30); do
  if curl -sf http://localhost:18080/app/actuator/health > /dev/null; then
    echo "App came up in ${i}s"
    break
  fi
  sleep 1
done

# Grab the logs regardless — you want to see them even on success,
# because warnings during deploy are tomorrow's incidents
docker logs smoke-test | tail -100

# Fail the test if Tomcat logged a deployment failure
docker logs smoke-test 2>&1 | grep -qE "(SEVERE|FAIL|Exception in startup)" && exit 1

# Cleanup
docker rm -f smoke-test
This is the layer most teams skip and most regret skipping. It catches the class of bugs where the WAR is structurally fine, passes all unit tests, but fails on startup because a property references a bean that wasn't wired, or a native library isn't on the classloader. Running it in CI before the Prod deploy — against the exact final WAR with Prod-shaped properties (minus real secrets) — is the highest-leverage test you can add.
Match the image tag to your real Tomcat version. If Prod runs Tomcat 9.0.73 on JDK 17, don't smoke-test against tomcat:10-jdk21 and assume it means anything.
4. Functional / integration tests against the running container
Catches: endpoints returning wrong data, auth broken, DB connectivity wrong.
Once the container is up from step 3, hit real endpoints:
bash# Liveness
curl -sf http://localhost:18080/app/actuator/health | jq -e '.status == "UP"'

# A known-good endpoint
curl -sf http://localhost:18080/app/api/v1/ping | jq -e '.message == "pong"'

# Auth flow (if applicable)
TOKEN=$(curl -sf -X POST http://localhost:18080/app/auth/login \
  -H 'Content-Type: application/json' \
  -d '{"user":"smoke","pass":"..."}' | jq -r .token)
curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:18080/app/api/v1/secured
For anything beyond ping, you need dependencies — a DB, maybe WSO2 IS for auth. Two options:
Docker Compose for the test stack. Spin up Tomcat + Postgres + mock WSO2 IS, run a test suite (Postman/Newman, REST Assured, or just curl scripts), tear down. Runs well on self-hosted runners that have Docker.
Testcontainers from a dedicated test module. More appropriate if the team writes tests in Java — you get proper assertions and test reports. Overkill for a deploy pipeline, ideal for a pre-release test job.
5. The Tomcat Manager API is itself a test
One thing worth knowing: the deploy call in the pipeline (PUT /manager/text/deploy?...) doesn't just copy the file. Tomcat parses web.xml, initializes the context, starts the app, and returns FAIL - ... in the response body if any of that fails. So the grep -q "^OK -" line in the earlier pipeline is already a smoke test against the real target Tomcat — that's why it's there instead of just checking the HTTP status.
The health-check step that follows it (/actuator/health probe with retries) is layer 4 in miniature: "the app didn't just start, it's actually serving requests."
Where to put each layer in your pipeline
A reasonable split for a bank deploy pipeline:
LayerWhereStructural validationRight after property injection, before uploadStatic / vuln scanIn the WAR-build pipeline (not the deploy pipeline) — before it's ever releasedSmoke test in containerIn the deploy pipeline, on a dev or test env, before promoting to UATFunctional testsOn UAT after deploy, gated before ProdManager API + health checkThe deploy itself, on every environment
The reason to separate build-time checks (Trivy, dep analysis) from deploy-time checks (smoke, functional) is that the same WAR moves through Dev → UAT → Prod. You don't want to re-scan on every deploy, but you absolutely want to re-verify it runs with this environment's properties.
A concrete add to your current pipeline
If you want to add layer 3 (smoke test in container) to the deploy workflow between "Inject properties" and "Deploy to Tomcat Manager", here's the block:
yaml      - name: Smoke test in disposable Tomcat
        run: |
          set -euo pipefail
          docker run -d --name smoke-${{ github.run_id }} \
            -p 18080:8080 \
            -v "$GITHUB_WORKSPACE/${DEPLOY_WAR}:/usr/local/tomcat/webapps/${{ inputs.application }}.war:ro" \
            tomcat:9-jdk17

          # Wait up to 60s for the context to come up
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:18080/${{ inputs.application }}/actuator/health" > /dev/null 2>&1; then
              echo "Smoke test passed in ${i}s"
              docker logs "smoke-${{ github.run_id }}" | tail -50
              docker rm -f "smoke-${{ github.run_id }}"
              exit 0
            fi
            sleep 1
          done

          echo "::error::App failed to start within 60s"
          docker logs "smoke-${{ github.run_id }}" | tail -200
          docker rm -f "smoke-${{ github.run_id }}"
          exit 1
The catch: this uses the env-specific properties, which for UAT/Prod contain real DB URLs the smoke container can't reach from the runner. Two ways to handle that:

Only smoke-test with dev properties, regardless of target env. Catches startup failures but not env-specific config bugs.
Run the smoke container on a network that can reach the DB (self-hosted runner in the right VLAN). More realistic, more infra to set up.

Most banks do (1) as a gate before deploy, and rely on (4) post-deploy against the real target. Which route makes sense depends on how much your app does at startup vs on first request — if it eagerly connects to the DB during Spring context init, you need option 2 to catch anything useful.
