# syntax=docker/dockerfile:1.7

FROM python:3.12-slim AS base

ENV PYTHONDONTWRITEBYTECODE=1 \
    PYTHONUNBUFFERED=1 \
    PIP_NO_CACHE_DIR=1 \
    PIP_DISABLE_PIP_VERSION_CHECK=1

# Create non-root user and group with specified UIDs/GIDs
RUN groupadd --system --gid 1003 appgroup \
 && useradd  --system --uid 1003 --gid appgroup \
             --home-dir /app --shell /usr/sbin/nologin appuser

# ---------- build stage ----------
FROM base AS builder

# System build deps (remove those you don't need)
RUN apt-get update && apt-get install -y --no-install-recommends \
      build-essential \
      gcc \
 && rm -rf /var/lib/apt/lists/*

WORKDIR /app

# Install deps into an isolated prefix so we can copy only what's needed
COPY requirements.txt .
RUN pip install --prefix=/install -r requirements.txt

# ---------- runtime stage ----------
FROM base AS runtime

# Copy installed site-packages / entrypoints from builder
COPY --from=builder /install /usr/local

WORKDIR /app

# Copy app code with correct ownership in a single layer
COPY --chown=appuser:appgroup . /app

USER appuser:appgroup

EXPOSE 8000

# Healthcheck — adjust endpoint/port for your app
HEALTHCHECK --interval=30s --timeout=5s --start-period=15s --retries=3 \
  CMD python -c "import urllib.request,sys; \
sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else sys.exit(1)" \
  || exit 1

# Replace with your actual entrypoint
CMD ["python", "-m", "app"]
